{% extends "players/base_player.html" %}

{% block titleHead %}
  Confirmar resultado
{% endblock %}

{% block script %}
  <script src="{{ url_for('static', filename='js/player/confirm_result.js') }}" type="module"></script>
{% endblock %}

{% block content %}
<div id="confirmarResultado">
  <h1>Confirmar resultado</h1>

  <div id="tarjetaResultado">
    <form id="formResultado">

      <div class="set">
        <h3>Set 1</h3>
        <div class="inputs">
          <input type="number" id="a1" min="0" max="7" placeholder="Equipo A" required>
          <span>-</span>
          <input type="number" id="b1" min="0" max="7" placeholder="Equipo B" required>
        </div>
      </div>

      <div class="set">
        <h3>Set 2</h3>
        <div class="inputs">
          <input type="number" id="a2" min="0" max="7" placeholder="Equipo A" required>
          <span>-</span>
          <input type="number" id="b2" min="0" max="7" placeholder="Equipo B" required>
        </div>
      </div>

      <div class="set">
        <h3>Set 3</h3>
        <div class="inputs">
          <input type="number" id="a3" min="0" max="7" placeholder="Equipo A">
          <span>-</span>
          <input type="number" id="b3" min="0" max="7" placeholder="Equipo B">
        </div>
        <p class="hint">Si el partido termina en 2 sets, deja 0-0</p>
      </div>

      <div id="estadoConfirmacion">
        <p id="estadoTexto"></p>
      </div>

      <div id="botones">
        <button type="submit" id="guardarBoton">Guardar resultado</button>
        <button type="button" id="cancelBoton">Cancelar</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
