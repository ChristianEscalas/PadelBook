{% extends 'players/base_player.html' %}

{% block titleHead %}
  Confirmar reserva
{% endblock %}

{% block script %}
  <script src="{{ url_for('static', filename='js/player/confirm_reservation.js') }}" type="module"></script>
{% endblock %}

{% block content %}
<div id="confirmar-reserva">
  <h1>Confirmar reserva</h1>

  <div class="tarjetaClub">
    <h3 id="club"></h3>

    <div class="infoClub">
      <div class="fotoclub">
        <img id="fotoCluB" alt="Foto del club">
      </div>

      <div class="info">
        <p><strong>Día:</strong></p>
        <p><strong>Hora:</strong></p>
        <p><strong>Duración:</strong></p>
        <p><strong>Tipo:</strong></p>
      </div>

      <div class="datos">
        <p id="dia"></p>
        <p id="hora"></p>
        <p id="duracion"></p>
        <p id="tipo"></p>
      </div>

      <div class="info">
        <p><strong>Cubierta:</strong></p>
        <p><strong>Pared:</strong></p>
        <p><strong>Superficie:</strong></p>
        <p><strong>Pista nº:</strong></p>
      </div>

      <div class="datos">
        <p id="cubierta"></p>
        <p id="pared"></p>
        <p id="superficie"></p>
        <p id="pista"></p>
      </div>

      <div class="boton-reserva">
        <button type="button" id="confirmarBoton">Confirmar</button>
        <button type="button" id="cancelarBoton">Cancelar</button>
      </div>

    </div>
  </div>
</div>
{% endblock %}
